<!-- 임시 프리미티브 플레이그라운드 — Phase 3에서 실제 홈 화면으로 대체한다. -->
<main class="min-h-dvh p-section flex flex-col gap-xl items-start">
  <h1 class="font-display text-3xl font-bold text-ink">디자인 시스템 — 프리미티브</h1>

  <section class="flex flex-col gap-md">
    <h2 class="font-display text-xl text-ink">Button</h2>
    <div class="flex flex-wrap gap-sm items-center">
      <button ui-button variant="primary">기본 버튼</button>
      <button ui-button variant="cta">시작하기</button>
      <button ui-button variant="ghost">고스트</button>
      <button ui-button variant="primary" [disabled]="true">비활성</button>
    </div>
  </section>
</main>
